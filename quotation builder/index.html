<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#18181B" />
  <title>Automation Quote Builder | Professional Agency Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <style>
    body {
      background-color: #101014;
      color: white;
      font-family: sans-serif;
      margin: 0;
    }

    #error-display {
      padding: 20px;
      color: #ff4444;
      display: none;
    }
  </style>
</head>

<body>
  <div id="error-display"></div>
  <div id="root">
    <div
      style="display: flex; height: 100vh; align-items: center; justify-content: center; font-size: 1.2rem; color: #71717A;">
      Initializing Agency Workspace...
    </div>
  </div>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      const display = document.getElementById('error-display');
      if (display) {
        display.style.display = 'block';
        display.innerText = 'Error: ' + msg + ' at ' + line + ':' + col;
      }
      return false;
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
